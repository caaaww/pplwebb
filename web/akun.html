<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akun - NilaBot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
<div class="sidebar-overlay"></div>
<div class="sidebar">
  <h1>🐟 NilaBot</h1>
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="kolam.html">🏊 Monitoring Kolam</a>
  <a href="jadwal.html">📅 Jadwal Pakan</a>
  <a href="riwayat-pakan.html">📋 Riwayat Pakan</a>
  <a href="riwayat-sensor.html">📡 Riwayat Sensor</a>
  <a href="notifikasi.html">🔔 Notifikasi</a>
  <a href="akun.html" class="active">👤 Akun</a>
</div>
<div class="header">
  <span class="header-title">Akun</span>
  <div class="header-right">
    <span class="header-user" id="hUser"></span>
    <button class="btn-logout" onclick="showLogoutModal()">⏻ Logout</button>
  </div>
</div>
<div class="main">
  <h1>Akun</h1>
  <div class="detail-card" style="max-width:440px">
    <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px">
      <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#0e7490,#0ea5e9);display:flex;align-items:center;justify-content:center;font-size:28px">👤</div>
      <div>
        <div style="font-size:20px;font-weight:700;color:var(--text-primary);margin-bottom:6px" id="namaAkun">Admin</div>
        <span class="badge badge-info">Administrator</span>
      </div>
    </div>
    <div class="detail-row">
      <span class="detail-label">Username</span>
      <span class="detail-value" id="usernameAkun">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Role</span>
      <span class="detail-value">Administrator</span>
    </div>
    <div style="margin-top:24px">
      <button class="btn-danger" style="width:100%;padding:13px;font-size:15px" onclick="showLogoutModal()">⏻ Keluar dari Akun</button>
    </div>
  </div>
</div>
<script src="app.js"></script>
<script>
authGuard();
const username = localStorage.getItem("username") || "Admin";
document.getElementById("hUser").textContent    = "👤 " + username;
document.getElementById("namaAkun").textContent  = username;
document.getElementById("usernameAkun").textContent = username;

function showLogoutModal() {
  showModal(
    "Keluar Akun",
    "Apakah Anda yakin ingin keluar dari akun?",
    logout,
    () => { /* tidak melakukan apa-apa, stay */ }
  );
}
</script>
</body>
</html>
