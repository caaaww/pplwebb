<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal Pakan - NilaBot</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
<button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
<div class="sidebar-overlay"></div>
<div class="sidebar">
  <h1>🐟 NilaBot</h1>
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="kolam.html">🏊 Monitoring Kolam</a>
  <a href="jadwal.html" class="active">📅 Jadwal Pakan</a>
  <a href="riwayat-pakan.html">📋 Riwayat Pakan</a>
  <a href="riwayat-sensor.html">📡 Riwayat Sensor</a>
  <a href="notifikasi.html">🔔 Notifikasi</a>
  <a href="akun.html">👤 Akun</a>
</div>
<div class="header">
  <span class="header-title">Jadwal Pakan</span>
  <div class="header-right">
    <span class="header-user" id="hUser"></span>
    <button class="btn-logout" onclick="showLogoutModal()">⏻ Logout</button>
  </div>
</div>
<div class="main">
  <h1>Jadwal Pakan</h1>
  <div id="jadwalList"><p style="color:var(--text-muted)">Memuat data...</p></div>
</div>

<!-- FAB Tambah -->
<button class="fab" onclick="window.location.href='jadwal-tambah.html'" title="Tambah Jadwal">+</button>

<script src="supabase.js"></script>
<script src="app.js"></script>
<script>
authGuard();
document.getElementById("hUser").textContent = "👤 " + (localStorage.getItem("username") || "Admin");

async function load() {
  const { data } = await supabaseClient.from("jadwal_pakan")
    .select("*").eq("status","Aktif").order("jadwal_id",{ascending:false});
  const box = document.getElementById("jadwalList");
  if (!data || !data.length) { box.innerHTML = '<p style="color:var(--text-muted)">Belum ada jadwal pakan.</p>'; return; }
  box.innerHTML = data.map(j => `
    <div class="list-card" onclick="bukaDetail(${j.jadwal_id})">
      <div>
        <div class="list-card-title">⏰ ${j.waktu_pakan} — Kolam ${j.kolam_id || j.kolam || "?"}</div>
        <div class="list-card-sub">Jumlah: ${j.jumlah_pakan} g &nbsp;|&nbsp; <span class="badge badge-success">Aktif</span></div>
      </div>
      <span class="list-card-arrow">›</span>
    </div>`).join("");
}

function bukaDetail(id) {
  localStorage.setItem("jadwal_id", id);
  window.location.href = "jadwal-detail.html";
}

function showLogoutModal() {
  showModal("Keluar Akun", "Apakah Anda yakin ingin keluar dari akun?", logout);
}

load();
</script>
</body>
</html>
