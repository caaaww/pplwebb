<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data pH - NilaBot</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
<button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
<div class="sidebar-overlay"></div>
<div class="sidebar">
  <h1>🐟 NilaBot</h1>
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="kolam.html" class="active">🏊 Monitoring Kolam</a>
  <a href="jadwal.html">📅 Jadwal Pakan</a>
  <a href="riwayat-pakan.html">📋 Riwayat Pakan</a>
  <a href="riwayat-sensor.html">📡 Riwayat Sensor</a>
  <a href="notifikasi.html">🔔 Notifikasi</a>
  <a href="akun.html">👤 Akun</a>
</div>
<div class="header">
  <span class="header-title" id="headerTitle">Data pH</span>
  <div class="header-right">
    <span class="header-user" id="hUser"></span>
    <button class="btn-logout" onclick="showLogoutModal()">⏻ Logout</button>
  </div>
</div>
<div class="main">
  <button class="btn-back" onclick="history.back()">‹ Kembali</button>
  <h1 id="pageTitle">Data pH</h1>
  <div class="table-box">
    <table>
      <thead><tr><th>No</th><th>Nilai pH</th><th>Status</th><th>Waktu</th></tr></thead>
      <tbody id="phBody"></tbody>
    </table>
  </div>
</div>
<script src="supabase.js"></script>
<script src="app.js"></script>
<script>
authGuard();
document.getElementById("hUser").textContent = "👤 " + (localStorage.getItem("username") || "Admin");
const kolamNama = localStorage.getItem("kolam_nama") || "Kolam";
const kolamId   = localStorage.getItem("kolam_id");
document.getElementById("pageTitle").textContent   = "🧪 Data pH - " + kolamNama;
document.getElementById("headerTitle").textContent = "Data pH - " + kolamNama;

async function load() {
  const { data } = await supabaseClient.from("data_sensor")
    .select("*").eq("kolam_id", kolamId).order("data_id",{ascending:false});
  const tbody = document.getElementById("phBody");
  if (!data || !data.length) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-muted)">Tidak ada data</td></tr>'; return; }
  tbody.innerHTML = data.map((r, i) => {
    const status = r.nilai_ph >= 6.5 && r.nilai_ph <= 8.5
      ? '<span class="badge badge-success">Normal</span>'
      : '<span class="badge badge-danger">Tidak Normal</span>';
    return `<tr>
      <td>${i+1}</td>
      <td><strong>${r.nilai_ph}</strong></td>
      <td>${status}</td>
      <td>${r.waktu}</td>
    </tr>`;
  }).join("");
}

function showLogoutModal() {
  showModal("Keluar Akun", "Apakah Anda yakin ingin keluar dari akun?", logout);
}

load();
</script>
</body>
</html>
