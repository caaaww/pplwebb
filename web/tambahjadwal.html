<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tambah Jadwal - NilaBot</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
<button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
<div class="sidebar-overlay"></div>
<div class="sidebar">
  <h1>🐟 NilaBot</h1>
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="kolam.html">🏊 Monitoring Kolam</a>
  <a href="jadwal.html" class="active">📅 Jadwal Pakan</a>
  <a href="riwayat-pakan.html">📋 Riwayat Pakan</a>
  <a href="riwayat-sensor.html">📡 Riwayat Sensor</a>
  <a href="notifikasi.html">🔔 Notifikasi</a>
  <a href="akun.html">👤 Akun</a>
</div>
<div class="header">
  <span class="header-title">Tambah Jadwal Pakan</span>
  <div class="header-right">
    <span class="header-user" id="hUser"></span>
    <button class="btn-logout" onclick="showLogoutModal()">⏻ Logout</button>
  </div>
</div>
<div class="main">
  <button class="btn-back" onclick="batalTambah()">‹ Kembali</button>
  <h1>Tambah Jadwal Pakan</h1>
  <div class="form-card">
    <div class="form-group">
      <label>Kolam</label>
      <select id="fKolam"><option value="">-- Pilih Kolam --</option></select>
    </div>
    <div class="form-group">
      <label>Waktu Pakan</label>
      <input type="time" id="fWaktu">
    </div>
    <div class="form-group">
      <label>Jumlah Pakan (g)</label>
      <input type="number" id="fJumlah" placeholder="Contoh: 500">
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="fStatus">
        <option value="">-- Pilih Status --</option>
        <option value="Aktif">Aktif</option>
        <option value="Nonaktif">Nonaktif</option>
      </select>
    </div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn-secondary" onclick="batalTambah()">Batal</button>
      <button class="btn-primary" onclick="simpan()">OK</button>
    </div>
  </div>
</div>
<script src="supabase.js"></script>
<script src="app.js"></script>
<script>
authGuard();
document.getElementById("hUser").textContent = "👤 " + (localStorage.getItem("username") || "Admin");

async function loadKolam() {
  const { data } = await supabaseClient.from("kolam").select("*").order("kolam_id");
  const sel = document.getElementById("fKolam");
  if (data) data.forEach(k => {
    const opt = document.createElement("option");
    opt.value = k.kolam_id;
    opt.textContent = k.nama_kolam;
    sel.appendChild(opt);
  });
}

function batalTambah() {
  showToast("Penambahan dibatalkan", "info");
  setTimeout(() => window.location.href = "jadwal.html", 1200);
}

async function simpan() {
  const kolam  = document.getElementById("fKolam").value;
  const waktu  = document.getElementById("fWaktu").value;
  const jumlah = document.getElementById("fJumlah").value;
  const status = document.getElementById("fStatus").value;

  if (!kolam || !waktu || !jumlah || !status) {
    showToast("Data tidak boleh kosong", "error"); return;
  }

  const { error } = await supabaseClient.from("jadwal_pakan").insert([{
    kolam_id: kolam, waktu_pakan: waktu,
    jumlah_pakan: jumlah, status: status
  }]);

  if (error) { showToast("Gagal menyimpan: " + error.message, "error"); return; }
  showToast("Jadwal berhasil ditambahkan", "success");
  setTimeout(() => window.location.href = "jadwal.html", 1400);
}

function showLogoutModal() {
  showModal("Keluar Akun", "Apakah Anda yakin ingin keluar dari akun?", logout);
}

loadKolam();
</script>
</body>
</html>
